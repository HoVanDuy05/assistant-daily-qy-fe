<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="robotHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  
  <!-- Decorative dots around -->
  <circle cx="256" cy="100" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="362" cy="160" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="362" cy="352" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="256" cy="412" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="150" cy="352" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="150" cy="160" r="3" fill="#6366f1" opacity="0.5"/>
  
  <!-- Robot Character -->
  <g transform="translate(256, 240)">
    <!-- Antenna -->
    <line x1="0" y1="-70" x2="0" y2="-90" stroke="#818cf8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-95" r="6" fill="#c7d2fe"/>
    
    <!-- Head -->
    <rect x="-45" y="-70" width="90" height="75" rx="20" fill="url(#robotHead)"/>
    
    <!-- Eyes -->
    <circle cx="-20" cy="-40" r="10" fill="#4338ca"/>
    <circle cx="20" cy="-40" r="10" fill="#4338ca"/>
    <circle cx="-17" cy="-43" r="4" fill="white"/>
    <circle cx="23" cy="-43" r="4" fill="white"/>
    
    <!-- Smile -->
    <path d="M-15 -20 Q0 -10 15 -20" fill="none" stroke="#4338ca" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Body -->
    <rect x="-35" y="10" width="70" height="50" rx="15" fill="url(#robotBody)"/>
    
    <!-- Chest light -->
    <circle cx="0" cy="35" r="8" fill="#c7d2fe"/>
  </g>
  
  <!-- Text: QY Assistant -->
  <text x="256" y="380" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="1">QY</text>
  <text x="256" y="410" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#a5b4fc" letter-spacing="2">ASSISTANT</text>
</svg>
